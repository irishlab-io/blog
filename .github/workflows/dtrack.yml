---
name: Manual - SBOM with Dependency-Track

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: '0 2 * * *' # Runs daily at 2:00 AM UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:

  sbom:
    name: Generate & Push SBOM to Dependency-Track
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - "3.10.11"
          - "3.10.11-alpine"
          - "3.10.11-alpine3.16"
          - "3.10.11-alpine3.17"
          - "3.10.11-alpine3.18"
          - "3.10.11-bullseye"
          - "3.10.11-buster"
          - "3.10.11-slim-bullseye"
          - "3.10.11-slim-buster"
          - "3.10.11-slim"
          - "3.10.11-windowsservercore-1809"
          - "3.10.11-windowsservercore-ltsc2022"
          - "3.10.11-windowsservercore"
    timeout-minutes: 5

    steps:
      - name: Connect to Tailnet # VPN connection to access Dependency-Track server
        uses: tailscale/github-action@53acf823325fe9ca47f4cdaa951f90b4b0de5bb9 # v4.1.1
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          ping: ${{ secrets.DEPLOY_HOST }}
          tags: "tag:ci"

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@62ad5284b8ced813296287a0b63906cb364b73ee # v0.22.0
        with:
          image: docker.io/python:${{ matrix.target }}
          format: cyclonedx-json
          artifact-name: ${{ matrix.target }}-sbom.json
          output-file: ${{ github.workspace }}/${{ matrix.target }}-sbom.json

      - name: Upload SBOM to Dependency-Track
        uses: DependencyTrack/gh-upload-sbom@48feab3080ff9e8f51f4d21861d9fc914eb744f5 # v3.1.0
        with:
          serverhostname: ${{ secrets.DEPENDENCYTRACK_HOST_URL }}
          apikey: ${{ secrets.DEPENDENCYTRACK_TOKEN }}
          parentname: ${{ github.repository.name }}
          projectname: "python"
          projectversion: "${{ matrix.target }}"
          bomfilename: ${{ github.workspace }}/${{ matrix.target }}-sbom.json
          autocreate: true
